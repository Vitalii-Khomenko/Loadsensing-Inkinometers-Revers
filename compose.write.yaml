# Explicit operator-selected write mode. Use only together with compose.yaml.
services:
  til90:
    command:
      - python
      - -m
      - tools.web_service
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --database
      - /app/data/til90.sqlite3
      - --auto-monitor
      - --measurement-interval
      - "10"
      - --health-interval
      - "60"
      - --enable-writes
      - --require-validated-firmware
    volumes:
      - type: bind
        source: ${TIL90_FIRMWARE_PATH:?Set TIL90_FIRMWARE_PATH to the verified LSG_TIL90_v2_81.bin file}
        target: /app/analysis/jadx/resources/firmwares/LSG_TIL90_v2_81.bin
        read_only: true
